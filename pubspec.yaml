name: habit_now_clone
description: Momentum Habits Flutter prototype focused on UI scaffolding.

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  animated_text_kit: ^4.2.2
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  fluttertoast: ^8.2.1
  font_awesome_flutter: ^10.4.0
  provider: ^6.0.5
  repository:
    path: repository
  slang: ^3.15.1
  slang_flutter: ^3.15.0
  styleguide:
    path: styleguide
  table_calendar: ^3.2.0
  go_router: ^16.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^4.0.0+1

dependency_overrides:
  move_to_background:
    path: third_party/move_to_background

flutter:
  uses-material-design: true

  
  
  
  

  
  

  
  

  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
